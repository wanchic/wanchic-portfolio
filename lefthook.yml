pre-commit:
  parallel: true
  commands:
    bash-lint:
      glob:
        - "bin/**"
        - "scripts/**"
      run: |
        grep -rl '^#!/.*\(bash\|sh\)' {all_files} | xargs shellcheck

    css-lint:
      glob: "*.{css,scss,sass}"
      run: npx --no-install stylelint -f verbose --fix {all_files}

    docker-lint:
      glob: "Dockerfile*"
      run: |
        for file in {all_files}; do
          echo "Linting $file"
          docker run --rm -i hadolint/hadolint < "$file"
        done

    erb-lint:
      glob: "*.{erb}"
      run: bundle exec erb_lint {all_files}

    haml-lint:
      glob: "*.{haml}"
      run: bundle exec haml-lint {all_files}

    html-lint:
      run: bundle exec htmlproofer ./public --assume-extension true

    js-lint:
      glob: "*.{js,mjs,cjs}"
      run: npx --no-install eslint {all_files}

    json-lint:
      glob: "*.json"
      run: |
        for file in {all_files}; do
          echo "Checking $file"
          jq empty "$file"
        done

    markdown-lint:
      glob: "*.md"
      run: bundle exec mdl {all_files}

    ruby-lint:
      glob: "{*.rb,Gemfile}"
      run: bundle exec rubocop -a --parallel --force-exclusion {all_files}

    yaml-lint:
      glob: "*.{yml,yaml}"
      run: yamllint {all_files}

    gem-audit:
      run: bin/bundler-audit

    js-audit:
      run: bin/importmap audit

    ruby-audit:
      run: bin/brakeman --no-pager

    code-test:
      run: bin/rails db:test:prepare && bin/rails test

    rspec-test:
      run: rspec

    system-test:
      run: bin/rails db:test:prepare && bin/rails test:system
