name: 🔥 Docker Build & Push

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Enables building ARM images on an amd64 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub using GitHub Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Your script should call buildx with --platform ... --push
      - name: Build and push (via script)
        env:
          DOCKER_IMAGE: wanchic/wanchic-portfolio
          DOCKER_PLATFORMS: linux/amd64,linux/arm64
          PUSH_LATEST: "true"
          DOCKER_EXTRA_TAGS: "sha-${{ github.sha }}"

          # ✅ Buildx cache using GitHub Actions cache backend
          DOCKER_CACHE_FROM: "type=registry,ref=wanchic/wanchic-portfolio:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=wanchic/wanchic-portfolio:buildcache,mode=max,compression=zstd"
        run: |
          chmod +x bin/docker-build-image
          bin/docker-build-image
