name: 🔥 Docker-Main

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: wanchic/wanchic-portfolio
  CACHE_REF: wanchic/wanchic-portfolio:buildcache

  BUILDKIT_PROGRESS: plain
  BUILDKIT_COMPRESSION: zstd
  BUILDKIT_COMPRESSION_LEVEL: 3

jobs:
  prep:
    name: Compute versions
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.vers.outputs.app_version }}
      ruby_version: ${{ steps.vers.outputs.ruby_version }}
    steps:
      - uses: actions/checkout@v6
      - id: vers
        run: |
          set -euo pipefail
          echo "app_version=$(bin/app-version)" >> "$GITHUB_OUTPUT"
          echo "ruby_version=$(bin/ruby-version)" >> "$GITHUB_OUTPUT"

  build-amd64:
    name: Build & Push (amd64)
    runs-on: ubuntu-latest
    needs: prep
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push (amd64 via script)
        env:
          DOCKER_IMAGE: ${{ env.IMAGE_NAME }}
          DOCKER_PLATFORMS: linux/amd64
          DOCKER_TAG_SUFFIX: "-amd64"

          DOCKER_DEPS_IMAGE: "${{ env.IMAGE_NAME }}:deps-amd64"

          DOCKER_APP_VERSION: ${{ needs.prep.outputs.app_version }}
          DOCKER_RUBY_VERSION: ${{ needs.prep.outputs.ruby_version }}

          # Don't publish unsuffixed latest/version here—manifest job will do that.
          PUSH_LATEST: "false"

          DOCKER_EXTRA_TAGS: "sha-${{ github.sha }}"

          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.CACHE_REF }}-amd64"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.CACHE_REF }}-amd64,mode=max,compression=zstd"
        run: |
          chmod +x bin/docker-build-image
          bin/docker-build-image

  build-arm64:
    name: Build & Push (arm64)
    runs-on: ubuntu-24.04-arm
    needs: prep
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push (arm64 via script)
        env:
          DOCKER_IMAGE: ${{ env.IMAGE_NAME }}
          DOCKER_PLATFORMS: linux/arm64
          DOCKER_TAG_SUFFIX: "-arm64"

          DOCKER_DEPS_IMAGE: "${{ env.IMAGE_NAME }}:deps-arm64"

          DOCKER_APP_VERSION: ${{ needs.prep.outputs.app_version }}
          DOCKER_RUBY_VERSION: ${{ needs.prep.outputs.ruby_version }}

          # Don't publish unsuffixed latest/version here—manifest job will do that.
          PUSH_LATEST: "false"

          DOCKER_EXTRA_TAGS: "sha-${{ github.sha }}"

          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.CACHE_REF }}-arm64"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.CACHE_REF }}-arm64,mode=max,compression=zstd"
        run: |
          chmod +x bin/docker-build-image
          bin/docker-build-image

  manifest:
    name: Create & Push Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64, prep]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifests (version, latest, sha)
        env:
          APP_VERSION: ${{ needs.prep.outputs.app_version }}
          SHA_TAG: sha-${{ github.sha }}
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          # Combine the two arch-specific images into multi-arch tags
          docker buildx imagetools create \
            -t "${IMAGE}:${APP_VERSION}" \
            "${IMAGE}:${APP_VERSION}-amd64" \
            "${IMAGE}:${APP_VERSION}-arm64"

          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${APP_VERSION}-amd64" \
            "${IMAGE}:${APP_VERSION}-arm64"

          docker buildx imagetools create \
            -t "${IMAGE}:${SHA_TAG}" \
            "${IMAGE}:${SHA_TAG}-amd64" \
            "${IMAGE}:${SHA_TAG}-arm64"
