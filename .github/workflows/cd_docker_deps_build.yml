name: 🧱 Docker Deps Build (Native)

on:
  pull_request:
  push:
    branches: [ "main" ]
    paths:
      - "Gemfile"
      - "Gemfile.lock"
      - "vendor/**"
      - "Dockerfile.deps"
      - ".github/workflows/cd_docker_deps_build.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: wanchic/wanchic-portfolio:deps
  CACHE_REF: wanchic/wanchic-portfolio:buildcache-deps
  DOCKER_FILE: Dockerfile.deps

  BUILDKIT_PROGRESS: plain
  BUILDKIT_COMPRESSION: zstd
  BUILDKIT_COMPRESSION_LEVEL: 3

jobs:
  deps-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build deps (amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f "${{ env.DOCKER_FILE }}" \
            --cache-from "type=registry,ref=${{ env.CACHE_REF }}-amd64" \
            --cache-to   "type=registry,ref=${{ env.CACHE_REF }}-amd64,mode=max,compression=zstd" \
            -t "${{ env.IMAGE_NAME }}-amd64" \
            --push \
            .

  deps-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build deps (arm64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f "${{ env.DOCKER_FILE }}" \
            --cache-from "type=registry,ref=${{ env.CACHE_REF }}-arm64" \
            --cache-to "type=registry,ref=${{ env.CACHE_REF }}-arm64,mode=max,compression=zstd" \
            -t "${{ env.IMAGE_NAME }}-arm64" \
            --push \
            .

  deps-manifest:
    runs-on: ubuntu-latest
    needs: [deps-amd64, deps-arm64]
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create deps manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${{ env.IMAGE_NAME }}" \
            "${{ env.IMAGE_NAME }}-amd64" \
            "${{ env.IMAGE_NAME }}-arm64"
