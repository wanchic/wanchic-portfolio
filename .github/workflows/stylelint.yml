name: Stylelint (SCSS)

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  stylelint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Stylelint
        run: npx stylelint "**/*.{css,scss,sass}"
